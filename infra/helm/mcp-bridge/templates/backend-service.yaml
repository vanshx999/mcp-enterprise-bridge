apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mcp-bridge
  labels:
    {{ include "mcp-bridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    {{ include "mcp-bridge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
