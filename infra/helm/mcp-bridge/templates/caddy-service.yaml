apiVersion: v1
kind: Service
metadata:
  name: caddy
  namespace: mcp-bridge
  labels:
    {{ include "mcp-bridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
spec:
  type: ClusterIP
  selector:
    {{ include "mcp-bridge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
