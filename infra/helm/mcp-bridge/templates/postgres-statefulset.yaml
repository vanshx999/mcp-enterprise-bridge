apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mcp-bridge.fullname" . }}-postgres
  namespace: mcp-bridge
  labels:
    {{ include "mcp-bridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      {{ include "mcp-bridge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{ include "mcp-bridge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      {{ include "mcp-bridge.imagePullSecrets" . | nindent 6 }}
      securityContext:
        fsGroup: 999
        runAsUser: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: mcp_bridge
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp-bridge.fullname" . }}-secrets
                  key: db-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
          resources: {{ toYaml .Values.resources.postgres | nindent 12 }}
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "mcp_bridge"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "mcp_bridge"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
        {{- if .Values.postgresql.persistence.storageClass }}
        storageClassName: {{ .Values.postgresql.persistence.storageClass }}
        {{- end }}
