apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-bridge.fullname" . }}-secrets
  namespace: mcp-bridge
  labels: {{ include "mcp-bridge.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  groq-api-key: {{ .Values.secrets.groqApiKey | b64enc | quote }}
  db-password: {{ .Values.secrets.dbPassword | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-bridge.fullname" . }}-db
  namespace: mcp-bridge
  labels: {{ include "mcp-bridge.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: {{ .Values.secrets.dbPassword }}
