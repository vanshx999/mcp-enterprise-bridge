services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8000"
    env_file: ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@pgbouncer:6432/mcp_bridge
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET_KEY_FILE=/run/secrets/jwt_secret
      - GROQ_API_KEY_FILE=/run/secrets/groq_api_key
      - APPROVAL_TIMEOUT_MINUTES=10
    secrets:
      - jwt_secret
      - groq_api_key
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips="*"
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app
          ignore:
            - __pycache__/

  frontend:
    build: ./frontend
    expose:
      - "5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    platform: linux/arm64/v8
    ports:
      - "6432:6432"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=mcp_bridge
      - LISTEN_PORT=6432
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=transaction
      - DEFAULT_POOL_SIZE=25
      - MAX_CLIENT_CONN=100
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_DB: mcp_bridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_bridge"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: unless-stopped

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  groq_api_key:
    file: ./secrets/groq_api_key.txt

volumes:
  caddy_data:
  caddy_config:
  pgdata:
