services:
  - type: web
    name: mcp-bridge-backend
    env: docker
    region: ohio
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mcp-bridge-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://mcp-bridge-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://mcp-bridge-frontend.onrender.com
      - key: REDIS_URL
        value: ""
      - key: APPROVAL_TIMEOUT_MINUTES
        value: "10"
      - key: RENDER
        value: "true"

  - type: web
    name: mcp-bridge-frontend
    env: static
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://mcp-bridge-backend.onrender.com

databases:
  - name: mcp-bridge-db
    plan: free
    databaseName: mcp_bridge
    ipAllowList: []
